name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint et build
    runs-on: ubuntu-latest

    steps:
      - name: Recupere le code
        uses: actions/checkout@v4

      - name: Installe Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installe les dependances
        run: npm ci

      - name: Verifie le formatage
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
